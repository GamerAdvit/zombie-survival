<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Zombie Survival</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { width:100%; height:100%; overflow:hidden; touch-action:none; }
    body {
      background:#0a0a0f; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      font-family:'Courier New',monospace; color:#00ff88;
    }
    h1 { font-size:clamp(11px,2vw,18px); letter-spacing:3px; margin-bottom:4px;
         text-transform:uppercase; text-shadow:0 0 12px #00ff88aa; }
    #gameCanvas {
      border:2px solid #00ff8855; box-shadow:0 0 20px #00ff8822;
      display:block; touch-action:none;
      max-width:100vw; max-height:calc(100vh - 200px);
    }
    #instructions { margin-top:4px; font-size:clamp(8px,1.5vw,10px);
                    color:#00ff8866; letter-spacing:1px; text-align:center; padding:0 8px; }

    /* ── ON-SCREEN CONTROLS — always visible for everyone ── */
    #gameControls {
      position:relative; width:100%; max-width:800px;
      height:150px; pointer-events:none; margin-top:4px;
      display:flex; align-items:center; justify-content:space-between;
    }

    /* Left — joystick */
    #joystickZone {
      position:relative; left:8px;
      width:120px; height:120px; pointer-events:all; flex-shrink:0;
    }
    #joystickBase {
      width:120px; height:120px; border-radius:50%;
      background:rgba(0,255,136,0.08); border:2px solid rgba(0,255,136,0.28);
    }
    #joystickKnob {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:50px; height:50px; border-radius:50%;
      background:rgba(0,255,136,0.40); border:2px solid #00ff88;
      pointer-events:none;
    }

    /* Middle — keyboard hint (desktop) */
    #kbHint {
      flex:1; text-align:center; color:#00ff8844;
      font-size:10px; line-height:1.8; pointer-events:none;
      padding:0 8px;
    }

    /* Right — action buttons */
    #actionBtns {
      position:relative; right:8px;
      display:flex; flex-direction:column; gap:8px;
      align-items:flex-end; pointer-events:all; flex-shrink:0;
    }
    #weaponStrip {
      display:flex; gap:5px; pointer-events:all;
    }
    .wBtn {
      width:44px; height:30px; border-radius:6px; font-size:9px;
      background:rgba(0,0,0,0.55); border:1px solid #ffffff33;
      color:#ffffff77; display:flex; align-items:center; justify-content:center;
      pointer-events:all; font-family:'Courier New',monospace; text-align:center;
      cursor:pointer; user-select:none; line-height:1.1;
    }
    .wBtn.active { border-color:#ffcc00; color:#ffcc00; background:rgba(255,200,0,0.18); }
    .wBtn:hover  { border-color:#ffffff66; color:#ffffffcc; }
    .wBtn.locked { opacity:0.3; }

    #mainBtns { display:flex; gap:10px; align-items:flex-end; }

    .aBtn {
      border-radius:50%; display:flex; align-items:center; justify-content:center;
      user-select:none; pointer-events:all; border:2px solid;
      cursor:pointer; transition:transform 0.08s, box-shadow 0.08s;
      font-family:'Courier New',monospace;
    }
    .aBtn:hover  { transform:scale(1.08); }
    .aBtn:active { transform:scale(0.92); }

    #specBtn { width:56px;height:56px; background:rgba(200,100,255,0.18); border-color:#cc44ff; color:#cc44ff; font-size:11px; text-align:center; line-height:1.2; }
    #grenBtn { width:56px;height:56px; background:rgba(0,200,100,0.18);  border-color:#00cc66; color:#00cc66; font-size:22px; }
    #fireBtn { width:76px;height:76px; background:rgba(255,80,0,0.22);   border-color:#ff5500; color:#ff5500; font-size:28px; }

    /* Active press states */
    #fireBtn.pressed { background:rgba(255,80,0,0.5); box-shadow:0 0 18px #ff5500; }
    #grenBtn.pressed { background:rgba(0,200,100,0.4); box-shadow:0 0 14px #00cc66; }
    #specBtn.pressed { background:rgba(200,100,255,0.4); box-shadow:0 0 14px #cc44ff; }
  </style>
</head>
<body>
  <h1>⚔ Zombie Survival</h1>
  <canvas id="gameCanvas" width="800" height="500"></canvas>

  <!-- On-screen controls — shown to ALL players (mobile, iPad, laptop) -->
  <div id="gameControls">

    <!-- LEFT: Joystick (touch) / WASD reminder (mouse) -->
    <div id="joystickZone">
      <div id="joystickBase"><div id="joystickKnob"></div></div>
    </div>

    <!-- MIDDLE: keyboard hint -->
    <div id="kbHint">
      WASD / Arrows — Move<br>
      Mouse — Aim &amp; Shoot<br>
      G — Grenade &nbsp; Q — Special<br>
      1–5 — Weapons
    </div>

    <!-- RIGHT: Action buttons -->
    <div id="actionBtns">
      <div id="weaponStrip">
        <div class="wBtn active" id="wBtn0">Pistol</div>
        <div class="wBtn locked" id="wBtn1">SG</div>
        <div class="wBtn locked" id="wBtn2">SMG</div>
        <div class="wBtn locked" id="wBtn3">SNP</div>
        <div class="wBtn locked" id="wBtn4">BZK</div>
      </div>
      <div id="mainBtns">
        <div class="aBtn" id="specBtn">Q<br>SPEC</div>
        <div class="aBtn" id="grenBtn">💣</div>
        <div class="aBtn" id="fireBtn">🔥</div>
      </div>
    </div>
  </div>
  <p id="instructions">Mobile: use joystick + buttons &nbsp;|&nbsp; Laptop/PC: WASD + mouse + keyboard</p>
<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx    = canvas.getContext('2d');

  // ============================================================
  // RESPONSIVE CANVAS — scales to fit any screen
  // ============================================================
  function resizeCanvas(){
    const maxW = window.innerWidth;
    const maxH = window.innerHeight - 210; // leave room for controls below
    const scaleW = maxW / 800;
    const scaleH = Math.max(50, maxH) / 500;
    const scale  = Math.min(scaleW, scaleH, 1.4);
    canvas.style.width  = Math.floor(800 * scale) + 'px';
    canvas.style.height = Math.floor(500 * scale) + 'px';
    // Also size the controls bar to match canvas width
    const cw = Math.floor(800*scale);
    document.getElementById('gameControls').style.width = cw+'px';
  }

  // ============================================================
  // DEVICE DETECTION — controls shown to everyone, behaviour adapts
  // ============================================================
  const isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  // Hide keyboard hint on pure touch devices to save space
  if(isMobile) document.getElementById('kbHint').style.display='none';

  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // ============================================================
  // JOYSTICK — works with touch AND mouse drag
  // ============================================================
  const joystick = { dx:0, dy:0, active:false, id:null, baseX:0, baseY:0 };
  const knob     = document.getElementById('joystickKnob');
  const jZone    = document.getElementById('joystickZone');
  const MAX_JOY  = 44;

  function getCanvasScale(){
    const rect = canvas.getBoundingClientRect();
    return { sx:800/rect.width, sy:500/rect.height, rect };
  }

  function joyStart(cx,cy){
    const r=jZone.getBoundingClientRect();
    joystick.active=true;
    joystick.baseX=r.left+r.width/2;
    joystick.baseY=r.top+r.height/2;
    joyMove(cx,cy);
  }
  function joyMove(cx,cy){
    const dx=cx-joystick.baseX, dy=cy-joystick.baseY;
    const len=Math.sqrt(dx*dx+dy*dy);
    const clx=len>MAX_JOY?dx/len*MAX_JOY:dx;
    const cly=len>MAX_JOY?dy/len*MAX_JOY:dy;
    joystick.dx=clx/MAX_JOY; joystick.dy=cly/MAX_JOY;
    knob.style.transform=`translate(calc(-50% + ${clx}px), calc(-50% + ${cly}px))`;
  }
  function joyEnd(){
    joystick.active=false; joystick.dx=0; joystick.dy=0;
    knob.style.transform='translate(-50%,-50%)';
  }

  // Touch events
  jZone.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];joystick.id=t.identifier;joyStart(t.clientX,t.clientY);},{passive:false});
  jZone.addEventListener('touchmove', e=>{e.preventDefault();for(const t of e.changedTouches){if(t.identifier===joystick.id)joyMove(t.clientX,t.clientY);}},{passive:false});
  jZone.addEventListener('touchend',  e=>{e.preventDefault();joyEnd();},{passive:false});
  jZone.addEventListener('touchcancel',e=>{e.preventDefault();joyEnd();},{passive:false});

  // Mouse drag events (laptop/desktop)
  jZone.addEventListener('mousedown', e=>{ e.preventDefault(); joyStart(e.clientX,e.clientY); });
  window.addEventListener('mousemove',e=>{ if(joystick.active) joyMove(e.clientX,e.clientY); });
  window.addEventListener('mouseup',  e=>{ if(joystick.active) joyEnd(); });

  // ============================================================
  // ON-SCREEN BUTTONS — work for mouse clicks AND touch
  // ============================================================
  function addBtn(id, onDown, onUp){
    const el = document.getElementById(id);
    if(!el) return;
    // Mouse
    el.addEventListener('mousedown', e=>{ e.preventDefault(); if(audioCtx.state==='suspended')audioCtx.resume(); onDown(); });
    if(onUp) el.addEventListener('mouseup',   e=>{ e.preventDefault(); onUp(); });
    if(onUp) el.addEventListener('mouseleave',e=>{ onUp(); });
    // Touch
    el.addEventListener('touchstart', e=>{ e.preventDefault(); if(audioCtx.state==='suspended')audioCtx.resume(); onDown(); },{passive:false});
    if(onUp) el.addEventListener('touchend',   e=>{ e.preventDefault(); onUp(); },{passive:false});
    if(onUp) el.addEventListener('touchcancel',e=>{ e.preventDefault(); onUp(); },{passive:false});
  }

  addBtn('fireBtn',
    ()=>{ mouseDown=true;  document.getElementById('fireBtn').classList.add('pressed'); },
    ()=>{ mouseDown=false; document.getElementById('fireBtn').classList.remove('pressed'); }
  );
  addBtn('grenBtn',
    ()=>{
      document.getElementById('grenBtn').classList.add('pressed');
      players.forEach(p=>{ if(p.alive&&p.id===0) throwGrenade(p); });
      setTimeout(()=>document.getElementById('grenBtn').classList.remove('pressed'),200);
    }, null
  );
  addBtn('specBtn',
    ()=>{
      document.getElementById('specBtn').classList.add('pressed');
      players.forEach(p=>{ if(p.alive&&p.id===0) useSpecial(p); });
      setTimeout(()=>document.getElementById('specBtn').classList.remove('pressed'),200);
    }, null
  );

  // Weapon buttons — click or tap to switch
  const WEAPON_NAMES = ['pistol','shotgun','smg','sniper','bazooka'];
  document.querySelectorAll('.wBtn').forEach((btn,i)=>{
    const activate = e=>{
      e.preventDefault();
      const p=players[0];
      if(p && p.weapons[WEAPON_NAMES[i]]){ p.currentWeapon=WEAPON_NAMES[i]; updateWeaponBtns(); }
    };
    btn.addEventListener('mousedown', activate);
    btn.addEventListener('touchstart', activate, {passive:false});
  });

  function updateWeaponBtns(){
    const p=players[0];
    if(!p) return;
    document.querySelectorAll('.wBtn').forEach((btn,i)=>{
      const owned = p.weapons[WEAPON_NAMES[i]];
      btn.classList.toggle('active',  p.currentWeapon===WEAPON_NAMES[i]);
      btn.classList.toggle('locked', !owned);
      btn.style.opacity = owned ? '1' : '0.35';
    });
  }

  // ============================================================
  // PERSISTENT KILLS — saved across sessions
  // ============================================================
  let lifetimeKills = parseInt(localStorage.getItem('zs_lifetime_kills') || '0');
  function saveLifetimeKills(v) {
    lifetimeKills = Math.max(lifetimeKills, v);
    localStorage.setItem('zs_lifetime_kills', lifetimeKills);
  }
  let highScore = parseInt(localStorage.getItem('zs_highscore') || '0');
  function saveHighScore(v) { if(v>highScore){highScore=v;localStorage.setItem('zs_highscore',v);} }

  // ============================================================
  // CHARACTER DEFINITIONS
  // ============================================================
  const CHARACTERS = [
    {
      id:0, name:'SOLDIER', desc:'All-rounder', killsRequired:0,
      color:'#00ff88', accent:'#aaffcc', dark:'#004422',
      speedBonus:0, hpBonus:0, grenadeBonus:0,
      special:{ name:'Airstrike', desc:'3 bombs hit nearby zombies', cooldown:600, key:'Q' },
      draw(cx,cy,angle,flash,ctx){
        ctx.fillStyle=flash?'#ff4444':'#2a6640';
        ctx.fillRect(-14,-14,28,28);
        ctx.fillStyle=flash?'#ff6666':'#1a4430';
        ctx.fillRect(-14,-14,28,10);
        ctx.fillStyle='#00ff88';
        ctx.fillRect(-5,-9,10,6);
        ctx.fillStyle='#aaffcc';
        ctx.fillRect(12,-3,10,6);
      }
    },
    {
      id:1, name:'GHOST', desc:'Silent & fast', killsRequired:20,
      color:'#aaaaff', accent:'#ffffff', dark:'#222244',
      speedBonus:1, hpBonus:0, grenadeBonus:0,
      special:{ name:'Invisibility', desc:'Zombies ignore you for 4s', cooldown:500, key:'Q' },
      draw(cx,cy,angle,flash,ctx){
        ctx.fillStyle=flash?'#ff4444':'rgba(180,180,255,0.85)';
        ctx.beginPath();
        ctx.arc(0,-4,13,Math.PI,0);
        ctx.lineTo(13,10);
        ctx.quadraticCurveTo(8,16,3,10);
        ctx.quadraticCurveTo(0,16,-3,10);
        ctx.quadraticCurveTo(-8,16,-13,10);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle='#222244';
        ctx.beginPath(); ctx.arc(-5,-4,4,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(5,-4,4,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#ffffff';
        ctx.beginPath(); ctx.arc(-4,-4,2,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(6,-4,2,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#aaaaff';
        ctx.fillRect(12,-2,10,4);
      }
    },
    {
      id:2, name:'ROBOT', desc:'Iron defence', killsRequired:30,
      color:'#88ccff', accent:'#ffffff', dark:'#112233',
      speedBonus:0, hpBonus:0, grenadeBonus:0,
      special:{ name:'Shield', desc:'Absorbs next 3 hits completely', cooldown:700, key:'Q' },
      draw(cx,cy,angle,flash,ctx){
        ctx.fillStyle=flash?'#ff4444':'#336699';
        ctx.fillRect(-14,-14,28,28);
        ctx.strokeStyle='#112233'; ctx.lineWidth=1.5;
        ctx.strokeRect(-14,-14,28,28);
        ctx.beginPath(); ctx.moveTo(-14,0); ctx.lineTo(14,0); ctx.stroke();
        ctx.fillStyle=flash?'#ff8888':'#00ffff';
        ctx.fillRect(-10,-10,20,8);
        ctx.fillStyle='#001122';
        ctx.fillRect(-9,-9,7,6); ctx.fillRect(2,-9,7,6);
        ctx.fillStyle='#88ccff';
        ctx.fillRect(-2,-20,4,8);
        ctx.beginPath(); ctx.arc(0,-20,4,0,Math.PI*2);
        ctx.fillStyle='#00ffff'; ctx.fill();
        ctx.fillStyle='#557799';
        ctx.fillRect(12,-4,14,8);
        ctx.fillStyle='#00ffff';
        ctx.beginPath(); ctx.arc(26,0,3,0,Math.PI*2); ctx.fill();
      }
    },
    {
      id:3, name:'NINJA', desc:'Fastest on the map', killsRequired:40,
      color:'#ff4466', accent:'#ffaaaa', dark:'#220011',
      speedBonus:1.5, hpBonus:0, grenadeBonus:0,
      special:{ name:'Dash', desc:'Teleport-dash in aim direction', cooldown:240, key:'Q' },
      draw(cx,cy,angle,flash,ctx){
        ctx.fillStyle=flash?'#ff8888':'#220011';
        ctx.fillRect(-10,-14,20,28);
        ctx.fillStyle=flash?'#ff4444':'#ff2244';
        ctx.fillRect(-11,-7,22,5);
        ctx.fillStyle='#ff4466';
        ctx.fillRect(-8,-6,5,3); ctx.fillRect(3,-6,5,3);
        ctx.fillStyle='#cccccc';
        ctx.save(); ctx.rotate(-0.3);
        ctx.fillRect(10,-16,3,20);
        ctx.fillStyle='#ff4466';
        ctx.fillRect(8,-2,7,4);
        ctx.restore();
      }
    },
    {
      id:4, name:'TANK', desc:'High HP beast', killsRequired:50,
      color:'#ffaa00', accent:'#ffdd88', dark:'#442200',
      speedBonus:-0.8, hpBonus:50, grenadeBonus:0,
      special:{ name:'Rage', desc:'Double damage for 5 seconds', cooldown:600, key:'Q' },
      draw(cx,cy,angle,flash,ctx){
        ctx.fillStyle=flash?'#ff4444':'#663300';
        ctx.fillRect(-17,-13,34,26);
        ctx.fillStyle=flash?'#ff6622':'#884400';
        ctx.fillRect(-17,-13,34,8);
        ctx.fillRect(-17,5,34,8);
        ctx.fillStyle='#ffaa00';
        ctx.fillRect(-7,-8,14,10);
        ctx.fillStyle='#442200';
        ctx.fillRect(-5,-6,4,5); ctx.fillRect(1,-6,4,5);
        ctx.fillStyle='#553300';
        ctx.fillRect(13,-5,16,10);
        ctx.fillStyle='#ffaa00';
        ctx.fillRect(27,-3,6,6);
      }
    },
    {
      id:5, name:'MEDIC', desc:'Heals the team', killsRequired:60,
      color:'#ff44aa', accent:'#ffaadd', dark:'#330022',
      speedBonus:0, hpBonus:30, grenadeBonus:0,
      special:{ name:'Heal Aura', desc:'Restores 20 HP to all teammates', cooldown:450, key:'Q' },
      draw(cx,cy,angle,flash,ctx){
        ctx.fillStyle=flash?'#ff4444':'#ffffff';
        ctx.fillRect(-12,-14,24,28);
        ctx.fillStyle='#ff2244';
        ctx.fillRect(-3,-6,6,14);
        ctx.fillRect(-8,-1,16,4);
        ctx.fillStyle='#ff44aa';
        ctx.fillRect(-12,-14,24,8);
        ctx.fillStyle='#330022';
        ctx.fillRect(-7,-10,4,4); ctx.fillRect(3,-10,4,4);
        ctx.fillStyle='#dddddd';
        ctx.fillRect(12,-3,12,6);
        ctx.fillStyle='#ff44aa';
        ctx.fillRect(23,-1,5,2);
      }
    },
    {
      id:6, name:'WIZARD', desc:'Magic abilities', killsRequired:70,
      color:'#cc44ff', accent:'#eebb ff', dark:'#220033',
      speedBonus:0, hpBonus:0, grenadeBonus:0,
      special:{ name:'Freeze', desc:'Slows all zombies for 5 seconds', cooldown:550, key:'Q' },
      draw(cx,cy,angle,flash,ctx){
        ctx.fillStyle=flash?'#ff4444':'#440066';
        ctx.beginPath();
        ctx.moveTo(-12,-12); ctx.lineTo(12,-12);
        ctx.lineTo(16,14); ctx.lineTo(-16,14);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle=flash?'#ff6666':'#330044';
        ctx.beginPath();
        ctx.moveTo(0,-28); ctx.lineTo(-14,-12); ctx.lineTo(14,-12);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle='#cc44ff';
        ctx.fillRect(-15,-14,30,4);
        ctx.beginPath(); ctx.arc(-4,2,3,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(5,-4,2,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#ffff00';
        ctx.fillRect(-6,-9,3,4); ctx.fillRect(3,-9,3,4);
        ctx.fillStyle='#885500';
        ctx.fillRect(12,-4,12,4);
        ctx.fillStyle='#ffff00';
        ctx.beginPath(); ctx.arc(24,0,5,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#ffffff';
        ctx.beginPath(); ctx.arc(24,0,2,0,Math.PI*2); ctx.fill();
      }
    },
    {
      id:7, name:'PUNK', desc:'Explosives expert', killsRequired:80,
      color:'#ff6600', accent:'#ffcc00', dark:'#220000',
      speedBonus:0, hpBonus:0, grenadeBonus:2,
      special:{ name:'Nuke', desc:'Massive explosion around the player', cooldown:800, key:'Q' },
      draw(cx,cy,angle,flash,ctx){
        ctx.fillStyle=flash?'#ff4444':'#111111';
        ctx.fillRect(-12,-14,24,28);
        const mColors=['#ff0000','#ff6600','#ffff00','#00ff00','#0000ff'];
        for(let i=0;i<5;i++){
          ctx.fillStyle=mColors[i];
          ctx.fillRect(-4+i*2,-24+i,-2+Math.sin(i)*2,10-i*1.5);
        }
        ctx.fillStyle='#ff6600';
        ctx.fillRect(-12,-14,4,28);
        ctx.fillRect(8,-14,4,28);
        ctx.fillStyle='#cc8855';
        ctx.fillRect(-8,-10,16,10);
        ctx.fillStyle='#111111';
        ctx.fillRect(-6,-8,4,4); ctx.fillRect(2,-8,4,4);
        ctx.fillStyle='#333333';
        ctx.fillRect(12,-5,16,10);
        ctx.fillStyle='#ff6600';
        ctx.beginPath(); ctx.arc(28,0,4,0,Math.PI*2); ctx.fill();
      }
    },
  ];

  // ============================================================
  // CHAR SELECT STATE
  // ============================================================
  const charSelect = { currentPlayerPicking:0, chosen:[], hovered:-1, previewAngle:0 };
  const CHAR_COLS=4, CARD_W=140, CARD_H=140, CARD_GAP=16;
  const GRID_W=CHAR_COLS*CARD_W+(CHAR_COLS-1)*CARD_GAP;
  const GRID_X=(canvas.width-GRID_W)/2, GRID_Y=130;
  function charCardRect(i){const col=i%CHAR_COLS,row=Math.floor(i/CHAR_COLS);return{x:GRID_X+col*(CARD_W+CARD_GAP),y:GRID_Y+row*(CARD_H+CARD_GAP)};}
  function isCharTaken(id){return charSelect.chosen.some(c=>c===id);}
  function isCharUnlocked(id){return lifetimeKills>=CHARACTERS[id].killsRequired;}
  function pickCharacter(id){
    if(isCharTaken(id)||!isCharUnlocked(id))return;
    charSelect.chosen[charSelect.currentPlayerPicking]=id;
    charSelect.currentPlayerPicking++;
    if(charSelect.currentPlayerPicking>=numPlayers) beginGame();
  }

  // ============================================================
  // SOUND
  // ============================================================
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  function playSound(type){
    if(audioCtx.state==='suspended')audioCtx.resume();
    const now=audioCtx.currentTime;
    const make=(f1,f2,dur,vol,wave,d=0)=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.connect(g);g.connect(audioCtx.destination);o.type=wave||'sawtooth';
      o.frequency.setValueAtTime(f1,now+d);o.frequency.exponentialRampToValueAtTime(f2,now+d+dur);
      g.gain.setValueAtTime(vol,now+d);g.gain.exponentialRampToValueAtTime(0.001,now+d+dur);
      o.start(now+d);o.stop(now+d+dur+0.01);
    };
    if(type==='shoot')      make(180,40,0.08,0.20);
    if(type==='shoot_heavy')make(120,20,0.18,0.25);

  // ============================================================
  // SPECIAL ABILITIES — activated with Q (or per-player key)
  // ============================================================
  let freezeTimer=0;          // global freeze state
  const specialEffects=[];    // visual effects for specials

  function useSpecial(p){
    if(!p.alive) return;
    const ch=CHARACTERS[p.charId];
    if(p.specialCooldown>0) return;
    p.specialCooldown=ch.special.cooldown;
    playSound('special');

    const pcx=p.x+p.width/2, pcy=p.y+p.height/2;

    if(p.charId===0){
      // SOLDIER — Airstrike: 3 bombs target nearby zombies
      const targets=[...zombies].sort((a,b)=>dist(pcx,pcy,a.x+a.width/2,a.y+a.height/2)-dist(pcx,pcy,b.x+b.width/2,b.y+b.height/2)).slice(0,3);
      targets.forEach((z,i)=>{
        setTimeout(()=>{
          const bx=z.x+z.width/2, by=z.y+z.height/2;
          specialEffects.push({type:'airstrike',x:bx,y:by,frame:0,maxFrames:30});
          createExplosion(bx,by,80);
        },i*200);
      });
      // If fewer than 3 zombies, bomb random spots near player
      for(let i=targets.length;i<3;i++){
        const rx=pcx+(Math.random()-0.5)*200, ry=pcy+(Math.random()-0.5)*200;
        setTimeout(()=>{
          specialEffects.push({type:'airstrike',x:rx,y:ry,frame:0,maxFrames:30});
          createExplosion(rx,ry,80);
        },i*200);
      }
    }

    if(p.charId===1){
      // GHOST — Invisibility: zombies ignore player for 4 seconds (240 frames)
      p.invisible=true;
      p.specialTimer=240;
      specialEffects.push({type:'ghost',x:pcx,y:pcy,frame:0,maxFrames:240,playerId:p.id});
    }

    if(p.charId===2){
      // ROBOT — Shield: absorbs next 3 hits
      p.shieldHits=3;
      specialEffects.push({type:'shield',x:pcx,y:pcy,frame:0,maxFrames:600,playerId:p.id});
    }

    if(p.charId===3){
      // NINJA — Dash: teleport 120px in aim direction instantly
      const dashDist=120;
      let newX=p.x+Math.cos(p.angle)*dashDist;
      let newY=p.y+Math.sin(p.angle)*dashDist;
      newX=Math.max(0,Math.min(canvas.width-p.width,newX));
      newY=Math.max(0,Math.min(canvas.height-p.height,newY));
      // Dash trail
      for(let i=0;i<8;i++){
        const t=i/8;
        particles.push({x:p.x+Math.cos(p.angle)*dashDist*t,y:p.y+Math.sin(p.angle)*dashDist*t,vx:0,vy:0,radius:6-i*0.5,alpha:0.8-t*0.8,color:p.color,fadeRate:0.06});
      }
      p.x=newX; p.y=newY;
      p.invincible=30; // brief invincibility after dash
    }

    if(p.charId===4){
      // TANK — Rage: double damage for 5 seconds (300 frames)
      p.rageActive=true;
      p.specialTimer=300;
      specialEffects.push({type:'rage',x:pcx,y:pcy,frame:0,maxFrames:300,playerId:p.id});
    }

    if(p.charId===5){
      // MEDIC — Heal Aura: restore 20 HP to all alive players
      playSound('heal');
      players.forEach(pl=>{
        if(!pl.alive) return;
        pl.health=Math.min(pl.maxHealth,pl.health+20);
        lootPopups.push({x:pl.x+pl.width/2,y:pl.y-10,label:'+20 HP',color:'#ff44aa',vy:-1.5,alpha:1});
      });
      specialEffects.push({type:'healAura',x:pcx,y:pcy,frame:0,maxFrames:60});
    }

    if(p.charId===6){
      // WIZARD — Freeze: slow all zombies 50% for 5 seconds (300 frames)
      playSound('freeze');
      freezeTimer=300;
      specialEffects.push({type:'freeze',x:canvas.width/2,y:canvas.height/2,frame:0,maxFrames:60});
    }

    if(p.charId===7){
      // PUNK — Nuke: MASSIVE explosion centred on the player
      playSound('nuke');
      triggerShake(25);
      setTimeout(()=>createExplosion(pcx,pcy,220,60),100);
      specialEffects.push({type:'nuke',x:pcx,y:pcy,frame:0,maxFrames:50});
    }
  }

    if((e.key==='e'||e.key==='E'||e.key==='Enter')&&gameState==='shop')advanceShop();
    // Special abilities
    if(gameState==='playing'){
      players.forEach(p=>{
        if(!p.alive)return;
        if(p.controls.special&&p.controls.special.some(k=>k===e.key))useSpecial(p);
      });

  function dist(ax,ay,bx,by){return Math.sqrt((ax-bx)**2+(ay-by)**2);}
  function rectHitsRect(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;}
  function circleHitsRect(cx,cy,cr,rx,ry,rw,rh){const clx=Math.max(rx,Math.min(cx,rx+rw)),cly=Math.max(ry,Math.min(cy,ry+rh));const dx=cx-clx,dy=cy-cly;return dx*dx+dy*dy<=cr*cr;}

  // ============================================================
  // GAME FLOW
  // ============================================================
  function goToCharSelect(n){numPlayers=n;charSelect.currentPlayerPicking=0;charSelect.chosen=[];charSelect.hovered=-1;gameState='charselect';}
  function beginGame(){
    players=[];
    for(let i=0;i<numPlayers;i++){
      const p=createPlayer(PLAYER_CONFIGS[i],charSelect.chosen[i]);
      // Apply spin wheel bonus coins / grenades from previous run
      if(spinWheel.startCoins>0){ p.coins+=spinWheel.startCoins; }
      if(spinWheel.startGrenades>0){ p.grenades+=spinWheel.startGrenades; }
      players.push(p);
    }
    // Reset one-time spin bonuses after applying
    spinWheel.startCoins=0;
    spinWheel.startGrenades=0;
    totalKills=0;deathTimer=0;freezeTimer=0;specialEffects.length=0;
    bullets.length=0;zombies.length=0;particles.length=0;chests.length=0;lootPopups.length=0;bossProjectiles.length=0;rockets.length=0;explosions.length=0;grenades.length=0;boss=null;
    gameState='playing';startWave(1);
  }
  function restartGame(){
    // Apply any pending spin reward
    if(spinWheel.pendingReward){
      const r=spinWheel.pendingReward;
      if(r.type==='kills')    saveLifetimeKills(lifetimeKills+r.amount);
      if(r.type==='starts_coins') spinWheel.startCoins=(spinWheel.startCoins||0)+r.amount;
      if(r.type==='starts_grenades') spinWheel.startGrenades=(spinWheel.startGrenades||0)+r.amount;
      spinWheel.pendingReward=null;
    }
    goToCharSelect(numPlayers);
  }

  function checkGameOver(){
    if(players.every(p=>!p.alive)){
      gameState='dead';
      saveHighScore(totalKills);
      saveLifetimeKills(lifetimeKills+totalKills);
      deathTimer=0;
      playSound('gameOver');
      // Eligible for free spin if survived past wave 5
      if(waveState.current>5){
        spinWheel.eligible=true;
        spinWheel.state='waiting'; // waiting → spinning → result
        spinWheel.angle=0;
        spinWheel.velocity=0;
        spinWheel.landed=false;
        spinWheel.pendingReward=null;
        spinWheel.showSpin=false;
      } else {
        spinWheel.eligible=false;
      }
    }
  }

  // ============================================================
  // SPIN WHEEL
  // ============================================================
  const SPIN_SEGMENTS = [
    { label:'+50 Coins',       desc:'Starts next game',  color:'#ffdd00', type:'starts_coins',    amount:50  },
    { label:'+10 Kills',       desc:'Toward unlocks',    color:'#00ff88', type:'kills',            amount:10  },
    { label:'+100 Coins',      desc:'Starts next game',  color:'#ffaa00', type:'starts_coins',     amount:100 },
    { label:'+3 Grenades',     desc:'Starts next game',  color:'#ff6600', type:'starts_grenades',  amount:3   },
    { label:'+25 Kills',       desc:'Toward unlocks',    color:'#44ff88', type:'kills',            amount:25  },
    { label:'+200 Coins',      desc:'Jackpot!',          color:'#ff4488', type:'starts_coins',     amount:200 },
    { label:'+5 Kills',        desc:'Toward unlocks',    color:'#88ffcc', type:'kills',            amount:5   },
    { label:'+50 Kills',       desc:'MEGA unlock bonus', color:'#cc44ff', type:'kills',            amount:50  },
  ];
  const SEG_COUNT = SPIN_SEGMENTS.length;
  const SEG_ANGLE = (Math.PI * 2) / SEG_COUNT;

  const spinWheel = {
    eligible:      false,
    state:         'waiting',   // 'waiting' | 'spinning' | 'result'
    showSpin:      false,       // becomes true after short delay on game over
    angle:         0,
    velocity:      0,
    decel:         0.97,
    landed:        false,
    pendingReward: null,
    startCoins:    0,
    startGrenades: 0,
    btnHovered:    false,
  };

  function startSpin(){
    if(spinWheel.state!=='waiting')return;
    spinWheel.state='spinning';
    spinWheel.velocity=0.25+Math.random()*0.2;  // fast initial spin
    spinWheel.decel=0.985;
    playSound('special');
  }

  function updateSpin(){
    if(!spinWheel.eligible||spinWheel.state!=='spinning')return;
    spinWheel.angle+=spinWheel.velocity;
    spinWheel.velocity*=spinWheel.decel;
    if(spinWheel.velocity<0.002){
      // Landed!
      spinWheel.velocity=0;
      spinWheel.state='result';
      // Which segment is at the top (pointer)?
      // Pointer is at -π/2 (top). Wheel angle offsets segments.
      const norm=((-spinWheel.angle%(Math.PI*2))+(Math.PI*2))%(Math.PI*2);
      const idx=Math.floor((norm+SEG_ANGLE/2)/SEG_ANGLE)%SEG_COUNT;
      spinWheel.pendingReward=SPIN_SEGMENTS[idx];
      // Apply kills immediately
      if(spinWheel.pendingReward.type==='kills'){
        saveLifetimeKills(lifetimeKills+spinWheel.pendingReward.amount);
        spinWheel.pendingReward=null; // applied, no need to carry
      }
      playSound('unlock');
    }
  }

  function drawSpinWheel(){
    if(!spinWheel.eligible||!spinWheel.showSpin)return;

    const cx=canvas.width/2, cy=canvas.height/2+20;
    const R=120;

    // Darken the game over overlay behind the wheel
    ctx.fillStyle='rgba(0,0,8,0.6)';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // Title
    ctx.fillStyle='#ffdd00'; ctx.shadowColor='#ffdd00'; ctx.shadowBlur=16;
    ctx.font='bold 22px Courier New'; ctx.textAlign='center';
    ctx.fillText('🎰 FREE SPIN! (survived wave 5+)',canvas.width/2,cy-R-44);
    ctx.shadowBlur=0;

    // Wheel segments
    SPIN_SEGMENTS.forEach((seg,i)=>{
      const startA=spinWheel.angle+i*SEG_ANGLE;
      const endA=startA+SEG_ANGLE;
      ctx.beginPath();
      ctx.moveTo(cx,cy);
      ctx.arc(cx,cy,R,startA,endA);
      ctx.closePath();
      ctx.fillStyle=seg.color;
      ctx.fill();
      ctx.strokeStyle='#000000';
      ctx.lineWidth=2;
      ctx.stroke();

      // Label inside segment
      ctx.save();
      ctx.translate(cx,cy);
      ctx.rotate(startA+SEG_ANGLE/2);
      ctx.textAlign='right';
      ctx.fillStyle='#000000';
      ctx.font='bold 10px Courier New';
      ctx.fillText(seg.label,R-8,3);
      ctx.restore();
    });

    // Centre cap
    ctx.beginPath(); ctx.arc(cx,cy,18,0,Math.PI*2);
    ctx.fillStyle='#0d1117'; ctx.fill();
    ctx.strokeStyle='#ffffff44'; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle='#ffffff'; ctx.font='bold 9px Courier New'; ctx.textAlign='center';
    ctx.fillText('SPIN',cx,cy+3);

    // Pointer (triangle at top)
    ctx.fillStyle='#ffffff';
    ctx.shadowColor='#ffffff'; ctx.shadowBlur=10;
    ctx.beginPath();
    ctx.moveTo(cx,cy-R-6);
    ctx.lineTo(cx-10,cy-R-22);
    ctx.lineTo(cx+10,cy-R-22);
    ctx.closePath(); ctx.fill();
    ctx.shadowBlur=0;

    // Spin button or result
    if(spinWheel.state==='waiting'){
      const bx=cx-70, by=cy+R+18, bw=140, bh=40;
      spinWheel.btnHovered=(mouseX>=bx&&mouseX<=bx+bw&&mouseY>=by&&mouseY<=by+bh);
      ctx.fillStyle=spinWheel.btnHovered?'#ffdd00':'#ffdd0044';
      ctx.strokeStyle='#ffdd00'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,8); ctx.fill(); ctx.stroke();
      ctx.fillStyle=spinWheel.btnHovered?'#000000':'#ffdd00';
      ctx.font='bold 16px Courier New'; ctx.textAlign='center';
      ctx.fillText('SPIN!',cx,by+26);
    }

    if(spinWheel.state==='spinning'){
      ctx.fillStyle='#ffffff88'; ctx.font='14px Courier New'; ctx.textAlign='center';
      ctx.fillText('Spinning…',cx,cy+R+38);
    }

    if(spinWheel.state==='result'&&spinWheel.pendingReward){
      const r=spinWheel.pendingReward;
      ctx.fillStyle=r.color; ctx.shadowColor=r.color; ctx.shadowBlur=20;
      ctx.font='bold 20px Courier New'; ctx.textAlign='center';
      ctx.fillText(`YOU WIN: ${r.label}`,cx,cy+R+30);
      ctx.shadowBlur=0;
      ctx.fillStyle='#ffffffaa'; ctx.font='13px Courier New';
      ctx.fillText(`${r.desc} — carries into next game`,cx,cy+R+50);
      ctx.fillStyle='#00ff88'; ctx.font='12px Courier New';
      ctx.fillText('Press R or click to play again',cx,cy+R+70);
    }

    if(spinWheel.state==='result'&&!spinWheel.pendingReward){
      // Kills reward — already applied
      ctx.fillStyle='#00ff88'; ctx.shadowColor='#00ff88'; ctx.shadowBlur=12;
      ctx.font='bold 18px Courier New'; ctx.textAlign='center';
      ctx.fillText('Kills bonus applied! ✓',cx,cy+R+30);
      ctx.shadowBlur=0;
      ctx.fillStyle='#ffffffaa'; ctx.font='12px Courier New';
      ctx.fillText('Press R or click to play again',cx,cy+R+50);
    }
  }

  // ============================================================

  // ============================================================
  function update(){
    updateShake();
    players.forEach(p=>{if(p.muzzleFlash>0)p.muzzleFlash--;});
    charSelect.previewAngle+=0.02;
    if(gameState==='menu'||gameState==='shop'||gameState==='charselect')return;
    if(gameState==='dead'){
      deathTimer++;
      // Show spin wheel after 2 seconds
      if(spinWheel.eligible&&deathTimer===120) spinWheel.showSpin=true;
      updateSpin();
      return;
    }
    if(gameState==='choice'){choice.countdown--;if(choice.countdown<=0){playSound('skip');startNextWave();}return;}

    // Freeze timer
    if(freezeTimer>0)freezeTimer--;

    // Special effects update
    for(let i=specialEffects.length-1;i>=0;i--){
      const ef=specialEffects[i];ef.frame++;
      if(ef.frame>=ef.maxFrames)specialEffects.splice(i,1);
    }

    // Player special timers
    players.forEach(p=>{
      if(!p.alive)return;
      if(p.specialCooldown>0)p.specialCooldown--;
      // Ghost invisibility
      if(p.invisible&&p.charId===1){p.specialTimer--;if(p.specialTimer<=0){p.invisible=false;}}
      // Tank rage
      if(p.rageActive&&p.charId===4){p.specialTimer--;if(p.specialTimer<=0){p.rageActive=false;}}
    });

    if(waveState.active){if(waveState.zombiesLeft>0){waveState.spawnTimer--;if(waveState.spawnTimer<=0){spawnZombie();waveState.zombiesLeft--;waveState.spawnTimer=Math.max(30,waveState.spawnInterval-(waveState.current-1)*5);}}if(waveState.zombiesLeft===0&&zombies.length===0&&(!waveState.isBossWave||boss===null))endWave();}else{if(waveState.bannerTimer>0)waveState.bannerTimer--;}

    players.forEach(p=>{
      if(!p.alive)return;
      let dx=0,dy=0;
      if(p.id===0&&isMobile){
        // Joystick movement for player 1 on mobile
        dx=joystick.dx*p.speed;
        dy=joystick.dy*p.speed;
        // Touch aim
        p.angle=Math.atan2(touchAimY-(p.y+p.height/2),touchAimX-(p.x+p.width/2));
        // Update weapon buttons
        updateWeaponBtns();
      } else {
        if(keys[p.controls.up[0]]||keys[p.controls.up[1]])dy=-p.speed;
        if(keys[p.controls.down[0]]||keys[p.controls.down[1]])dy=p.speed;
        if(keys[p.controls.left[0]]||keys[p.controls.left[1]])dx=-p.speed;
        if(keys[p.controls.right[0]]||keys[p.controls.right[1]])dx=p.speed;
        if(p.id===0){p.angle=Math.atan2(mouseY-(p.y+p.height/2),mouseX-(p.x+p.width/2));}
        else{if(dx!==0||dy!==0)p.angle=Math.atan2(dy,dx);}
      }
      p.x+=dx;p.y+=dy;
      p.x=Math.max(0,Math.min(canvas.width-p.width,p.x));
      p.y=Math.max(0,Math.min(canvas.height-p.height,p.y));
      resolveObstacles(p);
      const shootHeld=p.id===0?mouseDown:p.shootHeld;
      if(p.fireCooldown>0)p.fireCooldown--;if(shootHeld&&p.fireCooldown===0)shootBullet(p);
      if(p.invincible>0)p.invincible--;if(p.damageFlash>0)p.damageFlash--;if(p.grenadeCooldown>0)p.grenadeCooldown--;
    });

    for(let i=chests.length-1;i>=0;i--){const c=chests[i];c.pulse++;for(const p of players){if(p.alive&&!c.opened&&rectHitsRect(p.x,p.y,p.width,p.height,c.x,c.y,c.width,c.height)){openChest(c,p);break;}}if(c.opened){c.openTimer++;if(c.openTimer>40)chests.splice(i,1);}}
    for(let i=lootPopups.length-1;i>=0;i--){const p=lootPopups[i];p.y+=p.vy;p.alpha-=0.010;if(p.alpha<=0)lootPopups.splice(i,1);}
    for(let i=grenades.length-1;i>=0;i--){const g=grenades[i];g.x+=g.vx;g.y+=g.vy;g.z+=g.vz;g.vz-=0.25;g.fuse--;if(!g.bounced){if(g.x<10||g.x>canvas.width-10){g.vx*=-0.6;g.bounced=true;}if(g.y<10||g.y>canvas.height-10){g.vy*=-0.6;g.bounced=true;}}if(g.fuse<=0||(g.z<=0&&g.fuse<GRENADE_FUSE-10)){createExplosion(g.x,g.y,GRENADE_RADIUS);grenades.splice(i,1);}}
    for(let i=rockets.length-1;i>=0;i--){const r=rockets[i];r.trail.push({x:r.x,y:r.y});if(r.trail.length>12)r.trail.shift();r.x+=r.vx;r.y+=r.vy;r.frame++;if(r.frame%3===0)particles.push({x:r.x,y:r.y,vx:(Math.random()-0.5),vy:(Math.random()-0.5),radius:4+Math.random()*4,alpha:0.5,color:'#884422',fadeRate:0.03});if(r.x<-10||r.x>canvas.width+10||r.y<-10||r.y>canvas.height+10){createExplosion(r.x,r.y,EXPLOSION_RADIUS);rockets.splice(i,1);continue;}let hit=false;for(const z of zombies)if(circleHitsRect(r.x,r.y,10,z.x,z.y,z.width,z.height)){hit=true;break;}if(boss&&circleHitsRect(r.x,r.y,10,boss.x,boss.y,boss.width,boss.height))hit=true;if(hit){createExplosion(r.x,r.y,EXPLOSION_RADIUS);rockets.splice(i,1);}}
    for(let i=explosions.length-1;i>=0;i--){const ex=explosions[i];ex.frame++;ex.radius=ex.maxRadius*(ex.frame/ex.maxFrames);if(ex.frame>=ex.maxFrames)explosions.splice(i,1);}

    for(let i=bullets.length-1;i>=0;i--){const b=bullets[i];b.trail.push({x:b.x,y:b.y});if(b.trail.length>6)b.trail.shift();b.x+=b.vx;b.y+=b.vy;if(b.x<0||b.x>canvas.width||b.y<0||b.y>canvas.height){bullets.splice(i,1);continue;}let hit=false;if(boss&&circleHitsRect(b.x,b.y,b.radius,boss.x,boss.y,boss.width,boss.height)){boss.health-=b.damage;hit=true;playSound('bossHit');triggerShake(2);if(!boss.rage&&boss.health/boss.maxHealth<0.4){boss.rage=true;boss.speed*=1.4;boss.shootInterval=Math.max(30,boss.shootInterval-20);}if(boss.health<=0)bossDie();}if(!hit){for(let j=zombies.length-1;j>=0;j--){const z=zombies[j];if(circleHitsRect(b.x,b.y,b.radius,z.x,z.y,z.width,z.height)){z.health-=b.damage;hit=true;if(z.health<=0){const shooter=players.find(p=>p.id===b.ownerId);if(shooter){shooter.coins+=z.coinDrop;shooter.kills++;totalKills++;lootPopups.push({x:z.x+z.width/2,y:z.y,label:`+${z.coinDrop}`,color:shooter.color,vy:-1,alpha:1});}spawnBloodSplat(z.x+z.width/2,z.y+z.height/2,z.isBrute);zombies.splice(j,1);playSound('zombieHit');}break;}}}if(hit)bullets.splice(i,1);}

    // Boss AI
    if(boss){boss.eyePulse+=0.08;boss.wobble+=0.04;const target=nearestAlivePlayer(boss.x+boss.width/2,boss.y+boss.height/2);if(target){const bcx=boss.x+boss.width/2,bcy=boss.y+boss.height/2,tcx=target.x+target.width/2,tcy=target.y+target.height/2;boss.angle=Math.atan2(tcy-bcy,tcx-bcx);if(boss.specialActive&&boss.special==='charge'){boss.x+=Math.cos(boss.angle)*boss.speed*3.5;boss.y+=Math.sin(boss.angle)*boss.speed*3.5;}else{const w=boss.rage?Math.sin(boss.wobble)*0.5:Math.sin(boss.wobble)*0.2;boss.x+=Math.cos(boss.angle+w)*boss.speed*(boss.ghostAlpha<0.3?0:1);boss.y+=Math.sin(boss.angle+w)*boss.speed*(boss.ghostAlpha<0.3?0:1);}resolveObstacles(boss);boss.specialTimer++;if(boss.specialTimer>=boss.specialInterval){boss.specialTimer=0;const sp=boss.special==='all'?['charge','spray','teleport','spawn'][boss.specialCycle%4]:boss.special;if(boss.special==='all')boss.specialCycle++;if(sp==='charge'){boss.specialActive=true;boss.specialTimer2=boss.specialDuration;}if(sp==='spray'){for(let d=0;d<8;d++){const a=(Math.PI*2/8)*d;bossProjectiles.push({x:bcx,y:bcy,vx:Math.cos(a)*boss.projectileSpeed,vy:Math.sin(a)*boss.projectileSpeed,radius:8,alpha:1,color:boss.glowColor});}triggerShake(5);}if(sp==='teleport'){boss.ghostAlpha=0;setTimeout(()=>{if(boss){boss.x=tcx+(Math.random()-0.5)*180-boss.width/2;boss.y=tcy+(Math.random()-0.5)*180-boss.height/2;boss.x=Math.max(0,Math.min(canvas.width-boss.width,boss.x));boss.y=Math.max(0,Math.min(canvas.height-boss.height,boss.y));boss.ghostAlpha=1;triggerShake(8);}},400);}if(sp==='spawn'){for(let s=0;s<numPlayers;s++)spawnZombie();triggerShake(4);}}if(boss.specialActive){boss.specialTimer2--;if(boss.specialTimer2<=0)boss.specialActive=false;}boss.shootTimer++;if(boss.shootTimer>=boss.shootInterval&&boss.ghostAlpha>0.5){boss.shootTimer=0;const shots=boss.rage?boss.projectileCount+2:boss.projectileCount;for(let s=0;s<shots;s++){const spread=(s-(shots-1)/2)*0.22,a=boss.angle+spread;bossProjectiles.push({x:bcx,y:bcy,vx:Math.cos(a)*boss.projectileSpeed,vy:Math.sin(a)*boss.projectileSpeed,radius:8,alpha:1,color:boss.glowColor});}triggerShake(boss.rage?4:2);}if(target.invincible===0&&boss.ghostAlpha>0.5&&rectHitsRect(target.x,target.y,target.width,target.height,boss.x,boss.y,boss.width,boss.height)){target.health-=boss.damage;target.invincible=50;target.damageFlash=12;triggerShake(12);playSound('playerHurt');if(target.health<=0){target.health=0;target.alive=false;}checkGameOver();}}}

    for(let i=bossProjectiles.length-1;i>=0;i--){const pr=bossProjectiles[i];pr.x+=pr.vx;pr.y+=pr.vy;pr.alpha-=0.008;if(pr.x<0||pr.x>canvas.width||pr.y<0||pr.y>canvas.height||pr.alpha<=0){bossProjectiles.splice(i,1);continue;}let hit=false;for(const p of players){if(!p.alive||p.invincible>0||p.invisible)continue;if(dist(pr.x,pr.y,p.x+p.width/2,p.y+p.height/2)<pr.radius+14){// Robot shield blocks projectiles
      if(p.shieldHits>0){p.shieldHits--;lootPopups.push({x:p.x+p.width/2,y:p.y-10,label:`SHIELD ${p.shieldHits} left`,color:'#88ccff',vy:-1.5,alpha:1});hit=true;break;}p.health-=12;p.invincible=20;p.damageFlash=8;triggerShake(5);playSound('playerHurt');if(p.health<=0){p.health=0;p.alive=false;checkGameOver();}hit=true;break;}}if(hit)bossProjectiles.splice(i,1);}

    for(const z of zombies){
      // Apply freeze — zombies move at half speed
      const spd=freezeTimer>0?z.speed*0.3:z.speed;
      const target=nearestAlivePlayer(z.x+z.width/2,z.y+z.height/2);
      // Ghost invisible — pick a different target or wander
      let finalTarget=target;
      if(target&&target.invisible){finalTarget=players.find(p=>p.alive&&!p.invisible)||target;}
      if(!finalTarget)continue;
      const tcx=finalTarget.x+finalTarget.width/2,tcy=finalTarget.y+finalTarget.height/2;
      z.angle=Math.atan2(tcy-(z.y+z.height/2),tcx-(z.x+z.width/2));z.wobble+=z.wobbleSpeed;
      z.x+=Math.cos(z.angle+Math.sin(z.wobble)*0.4)*spd;z.y+=Math.sin(z.angle+Math.sin(z.wobble)*0.4)*spd;
      resolveObstacles(z);
      for(const p of players){
        if(!p.alive||p.invincible>0||p.invisible)continue;
        if(rectHitsRect(p.x,p.y,p.width,p.height,z.x,z.y,z.width,z.height)){
          // Robot shield blocks zombie hits too
          if(p.shieldHits>0){p.shieldHits--;lootPopups.push({x:p.x+p.width/2,y:p.y-10,label:`SHIELD ${p.shieldHits} left`,color:'#88ccff',vy:-1.5,alpha:1});break;}
          p.health-=z.damage;p.invincible=40;p.damageFlash=10;triggerShake(8);playSound('playerHurt');
          if(p.health<=0){p.health=0;p.alive=false;checkGameOver();}break;
        }
      }
    }
    for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vx*=0.92;p.vy*=0.92;p.alpha-=p.fadeRate||0.035;if(p.alpha<=0)particles.splice(i,1);}
  }

  // ============================================================
  // DRAW CHARACTER
  // ============================================================
  function drawCharacter(charId,cx,cy,angle,flash){
    const ch=CHARACTERS[charId];
    ctx.save();ctx.translate(cx,cy);ctx.rotate(angle);ch.draw(0,0,angle,flash,ctx);ctx.restore();
  }

  // ============================================================
  // DRAW CHAR SELECT
  // ============================================================
  function drawCharSelectScreen(){
    ctx.fillStyle='#0d1117';ctx.fillRect(0,0,canvas.width,canvas.height);
    const t=Date.now()/3000;ctx.strokeStyle='#00ff8808';ctx.lineWidth=1;
    for(let x=(t*20)%40-40;x<canvas.width;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke();}
    for(let y=(t*20)%40-40;y<canvas.height;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke();}

    const cp=charSelect.currentPlayerPicking;
    const pCols=['#00ff88','#4488ff','#ff8800','#cc44ff'];
    const pCol=pCols[cp]||'#00ff88';
    ctx.fillStyle=pCol;ctx.shadowColor=pCol;ctx.shadowBlur=16;
    ctx.font='bold 20px Courier New';ctx.textAlign='center';
    ctx.fillText(`${numPlayers>1?'P'+(cp+1)+' — ':''}CHOOSE YOUR CHARACTER`,canvas.width/2,36);ctx.shadowBlur=0;

    // Lifetime kills display
    ctx.fillStyle='#ffdd00';ctx.font='12px Courier New';ctx.textAlign='center';
    ctx.fillText(`Your lifetime kills: ${lifetimeKills}  ·  Unlocks more characters!`,canvas.width/2,58);

    if(numPlayers>1){for(let i=0;i<numPlayers;i++){const dotX=canvas.width/2-(numPlayers-1)*18+i*36;ctx.beginPath();ctx.arc(dotX,76,8,0,Math.PI*2);if(i<cp){ctx.fillStyle=pCols[i];ctx.fill();}else if(i===cp){ctx.fillStyle=pCols[i];ctx.shadowColor=pCols[i];ctx.shadowBlur=12;ctx.fill();ctx.shadowBlur=0;}else{ctx.strokeStyle='#ffffff33';ctx.lineWidth=2;ctx.stroke();}}}

    CHARACTERS.forEach((ch,i)=>{
      const{x,y}=charCardRect(i);
      const hov=charSelect.hovered===i;
      const taken=isCharTaken(i);
      const unlocked=isCharUnlocked(i);
      const takenByIdx=charSelect.chosen.indexOf(i);

      // Card bg
      if(!unlocked){
        ctx.fillStyle='#0a0e15';ctx.strokeStyle='#ffffff11';
      } else if(taken){
        ctx.fillStyle='rgba(0,0,0,0.7)';ctx.strokeStyle='#ffffff22';
      } else if(hov){
        ctx.fillStyle=ch.color+'22';ctx.strokeStyle=ch.color;
      } else {
        ctx.fillStyle='#0e1520';ctx.strokeStyle='#ffffff22';
      }
      ctx.lineWidth=hov&&unlocked?2:1;
      ctx.beginPath();ctx.roundRect(x,y,CARD_W,CARD_H,10);ctx.fill();ctx.stroke();

      if(!unlocked){
        // LOCKED — show silhouette + kill requirement
        ctx.globalAlpha=0.2;
        ctx.save();ctx.translate(x+CARD_W/2,y+CARD_H/2-14);ctx.scale(1.5,1.5);ch.draw(0,0,0,false,ctx);ctx.restore();
        ctx.globalAlpha=1;
        // Lock icon
        ctx.fillStyle='#ffffff55';ctx.font='22px Courier New';ctx.textAlign='center';
        ctx.fillText('🔒',x+CARD_W/2,y+CARD_H/2-16);
        ctx.fillStyle='#ff4444';ctx.font='bold 11px Courier New';
        ctx.fillText(ch.name,x+CARD_W/2,y+CARD_H-34);
        ctx.fillStyle='#ffdd00';ctx.font='10px Courier New';
        ctx.fillText(`${ch.killsRequired} kills to unlock`,x+CARD_W/2,y+CARD_H-20);
        // Progress bar
        const prog=Math.min(1,lifetimeKills/ch.killsRequired);
        ctx.fillStyle='#ffffff22';ctx.fillRect(x+10,y+CARD_H-10,CARD_W-20,5);
        ctx.fillStyle='#ffdd00';ctx.fillRect(x+10,y+CARD_H-10,(CARD_W-20)*prog,5);
      } else if(taken){
        ctx.globalAlpha=0.3;ctx.fillStyle='#000000';ctx.beginPath();ctx.roundRect(x,y,CARD_W,CARD_H,10);ctx.fill();ctx.globalAlpha=1;
        ctx.fillStyle=pCols[takenByIdx];ctx.font='bold 11px Courier New';ctx.textAlign='center';
        ctx.fillText(`P${takenByIdx+1} CHOSE THIS`,x+CARD_W/2,y+CARD_H/2+4);
      } else {
        // Available — show character + special info
        const previewAngle=hov?charSelect.previewAngle:0;
        ctx.save();ctx.translate(x+CARD_W/2,y+CARD_H/2-20);ctx.scale(1.5,1.5);ch.draw(0,0,previewAngle,false,ctx);ctx.restore();
        ctx.fillStyle=hov?ch.color:'#ffffffcc';ctx.font='bold 12px Courier New';ctx.textAlign='center';
        ctx.fillText(ch.name,x+CARD_W/2,y+CARD_H-40);
        ctx.fillStyle='#ffffff66';ctx.font='9px Courier New';
        ctx.fillText(ch.desc,x+CARD_W/2,y+CARD_H-28);
        // Special ability badge
        ctx.fillStyle=ch.color+'33';ctx.strokeStyle=ch.color+'66';ctx.lineWidth=1;
        ctx.beginPath();ctx.roundRect(x+6,y+CARD_H-22,CARD_W-12,16,4);ctx.fill();ctx.stroke();
        ctx.fillStyle=ch.color;ctx.font='bold 9px Courier New';
        ctx.fillText(`Q: ${ch.special.name}`,x+CARD_W/2,y+CARD_H-11);
        if(hov){ctx.shadowColor=ch.color;ctx.shadowBlur=20;ctx.strokeStyle=ch.color;ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(x,y,CARD_W,CARD_H,10);ctx.stroke();ctx.shadowBlur=0;}
      }
    });

    if(charSelect.chosen.length>0){ctx.fillStyle='#ffffff44';ctx.font='11px Courier New';ctx.textAlign='center';ctx.fillText('Chosen so far:',canvas.width/2,canvas.height-36);charSelect.chosen.forEach((cid,pi)=>{const ch=CHARACTERS[cid];const tx=canvas.width/2-(charSelect.chosen.length-1)*55+pi*110;ctx.save();ctx.translate(tx,canvas.height-14);ctx.scale(0.9,0.9);ch.draw(0,0,0,false,ctx);ctx.restore();ctx.fillStyle=pCols[pi];ctx.font='bold 10px Courier New';ctx.textAlign='center';ctx.fillText(`P${pi+1}:${ch.name}`,tx,canvas.height-2);});}
    ctx.textAlign='left';
  }

  // ============================================================
  // DRAW PLAYER
  // ============================================================
  function drawPlayer(p){
    if(!p.alive){ctx.globalAlpha=0.4;ctx.fillStyle=p.color;ctx.font='20px Courier New';ctx.textAlign='center';ctx.fillText('💀',p.x+p.width/2,p.y+p.height/2+7);ctx.globalAlpha=1;return;}
    const cx=p.x+p.width/2,cy=p.y+p.height/2;
    const show=p.invincible>0?Math.floor(p.invincible/4)%2===0:true;
    if(!show)return;

    // Ghost invisible — draw faded
    if(p.invisible)ctx.globalAlpha=0.3;

    // Glow ring
    if(!p.damageFlash){ctx.shadowColor=p.color;ctx.shadowBlur=12;ctx.strokeStyle=p.color+(p.rageActive?'ff':'55');ctx.lineWidth=p.rageActive?3:2;ctx.beginPath();ctx.arc(cx,cy,18,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;}

    // Robot shield ring
    if(p.shieldHits>0){
      ctx.strokeStyle='#88ccff';ctx.lineWidth=3;ctx.shadowColor='#88ccff';ctx.shadowBlur=15;
      ctx.beginPath();ctx.arc(cx,cy,22,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;
    }

    // Tank rage aura
    if(p.rageActive){
      ctx.globalAlpha=(p.invisible?0.15:0.2)+Math.sin(Date.now()/80)*0.1;
      ctx.fillStyle='#ff4400';
      ctx.beginPath();ctx.arc(cx,cy,26,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=p.invisible?0.3:1;
    }

    ctx.save();ctx.translate(cx,cy);ctx.rotate(p.angle);
    CHARACTERS[p.charId].draw(0,0,p.angle,p.damageFlash>0,ctx);
    if(p.muzzleFlash>0){ctx.shadowColor='#ffffff';ctx.shadowBlur=18;ctx.fillStyle=`rgba(255,240,180,${p.muzzleFlash/4})`;ctx.beginPath();ctx.arc(p.currentWeapon==='bazooka'?26:22,0,7,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}
    ctx.restore();

    ctx.globalAlpha=1;
    ctx.fillStyle=p.color;ctx.font='bold 10px Courier New';ctx.textAlign='center';
    ctx.fillText(`${p.name}·${CHARACTERS[p.charId].name}`,cx,p.y-8);
  }

  // ============================================================
  // DRAW SPECIAL EFFECTS
  // ============================================================
  function drawSpecialEffects(){
    specialEffects.forEach(ef=>{
      const progress=ef.frame/ef.maxFrames,alpha=1-progress;
      if(ef.type==='airstrike'){
        // Red targeting crosshair descending
        ctx.strokeStyle=`rgba(255,50,50,${alpha})`;ctx.lineWidth=2;
        const size=20+progress*10;
        ctx.beginPath();ctx.moveTo(ef.x-size,ef.y);ctx.lineTo(ef.x+size,ef.y);ctx.stroke();
        ctx.beginPath();ctx.moveTo(ef.x,ef.y-size);ctx.lineTo(ef.x,ef.y+size);ctx.stroke();
        ctx.beginPath();ctx.arc(ef.x,ef.y,size*0.6,0,Math.PI*2);ctx.stroke();
      }
      if(ef.type==='freeze'){
        // Ice blue pulse ring across whole map
        ctx.strokeStyle=`rgba(100,200,255,${alpha*0.8})`;ctx.lineWidth=4;
        ctx.beginPath();ctx.arc(canvas.width/2,canvas.height/2,progress*600,0,Math.PI*2);ctx.stroke();
      }
      if(ef.type==='healAura'){
        // Green expanding ring
        ctx.strokeStyle=`rgba(100,255,150,${alpha*0.9})`;ctx.lineWidth=4;
        ctx.beginPath();ctx.arc(ef.x,ef.y,progress*200,0,Math.PI*2);ctx.stroke();
        ctx.strokeStyle=`rgba(255,100,200,${alpha*0.6})`;ctx.lineWidth=2;
        ctx.beginPath();ctx.arc(ef.x,ef.y,progress*120,0,Math.PI*2);ctx.stroke();
      }
      if(ef.type==='nuke'){
        // Massive white flash
        const flashAlpha=ef.frame<10?(ef.frame/10)*0.8:alpha*0.5;

    }

    const btnW=130,btnH=52,btnGap=16,totalBtnW=4*btnW+3*btnGap,btnStartX=(canvas.width-totalBtnW)/2,by=canvas.height/2-14;
    for(let i=0;i<4;i++){const bx=btnStartX+i*(btnW+btnGap);if(cx>=bx&&cx<=bx+btnW&&cy>=by&&cy<=by+btnH){playSound('playerJoin');goToCharSelect(i+1);return;}}
  });

  // ============================================================
  // DRAW
  // ============================================================
  function draw(){
    if(gameState==='menu'){drawMenuScreen();return;}
    if(gameState==='charselect'){drawCharSelectScreen();return;}

    ctx.save();ctx.translate(shake.x,shake.y);
    ctx.fillStyle='#0d1117';ctx.fillRect(-10,-10,canvas.width+20,canvas.height+20);
    ctx.strokeStyle='#ffffff08';ctx.lineWidth=1;
    for(let x=0;x<canvas.width+20;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke();}
    for(let y=0;y<canvas.height+20;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke();}
    if(waveState.isBossWave&&boss){ctx.fillStyle=`rgba(80,0,0,${0.06+Math.sin(Date.now()/300)*0.03})`;ctx.fillRect(-10,-10,canvas.width+20,canvas.height+20);}
    drawObstacles();
    chests.forEach(c=>{const cx=c.x+c.width/2,cy=c.y+c.height/2;if(c.opened){ctx.globalAlpha=Math.max(0,1-c.openTimer/40);ctx.fillStyle='#ffdd00';ctx.shadowColor='#ffdd00';ctx.shadowBlur=20;ctx.font='22px Courier New';ctx.textAlign='center';ctx.fillText('✦',cx,cy);ctx.globalAlpha=1;ctx.shadowBlur=0;return;}const pulse=Math.sin(c.pulse*0.06)*0.5+0.5;ctx.shadowColor=`rgba(255,200,0,${0.4+pulse*0.4})`;ctx.shadowBlur=10+pulse*12;ctx.fillStyle='#8B5E1A';ctx.fillRect(c.x,c.y,c.width,c.height);ctx.fillStyle='#A0732A';ctx.fillRect(c.x,c.y,c.width,c.height*0.4);ctx.fillStyle='#FFD700';ctx.fillRect(cx-4,c.y+c.height*0.3,8,8);ctx.strokeStyle='#FFD700';ctx.lineWidth=1.5;ctx.strokeRect(c.x,c.y,c.width,c.height);ctx.strokeRect(c.x,c.y,c.width,c.height*0.4);ctx.shadowBlur=0;ctx.fillStyle='#ffffffcc';ctx.font='10px Courier New';ctx.textAlign='center';ctx.fillText('walk over',cx,c.y-6);});
    particles.forEach(p=>{ctx.globalAlpha=p.alpha;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;
    drawExplosions();
    drawSpecialEffects();
    drawGrenades();drawBoss();drawRockets();
    zombies.forEach(z=>{const zcx=z.x+z.width/2,zcy=z.y+z.height/2;ctx.save();ctx.translate(zcx,zcy);ctx.rotate(z.angle);
      // Freeze visual — blue tint on zombies
      ctx.shadowColor=freezeTimer>0?'#88ccff':z.glowColor;ctx.shadowBlur=z.isBrute?16:10;
      ctx.fillStyle=freezeTimer>0?'#6699cc':z.color;ctx.fillRect(-z.width/2,-z.height/2,z.width,z.height);
      ctx.shadowBlur=0;ctx.fillStyle='#ff2200';ctx.fillRect(-10,-8,6,6);ctx.fillRect(4,-8,6,6);ctx.fillStyle=z.isBrute?'#441100':'#002200';ctx.fillRect(-8,4,16,4);
      if(z.isBrute){ctx.fillStyle='#ffaa00cc';ctx.font='10px Courier New';ctx.textAlign='center';ctx.fillText('BRUTE',0,-z.height/2-4);}
      if(freezeTimer>0){ctx.fillStyle='rgba(150,220,255,0.5)';ctx.fillRect(-z.width/2,-z.height/2,z.width,z.height);}
      ctx.restore();if(z.maxHealth>1){ctx.fillStyle='#550000';ctx.fillRect(z.x,z.y-8,z.width,4);ctx.fillStyle='#ff4400';ctx.fillRect(z.x,z.y-8,z.width*(z.health/z.maxHealth),4);}});
    players.forEach(p=>drawPlayer(p));
    bullets.forEach(b=>{b.trail.forEach((pos,i)=>{ctx.fillStyle=`rgba(255,200,0,${(i/b.trail.length)*0.5})`;ctx.beginPath();ctx.arc(pos.x,pos.y,b.radius*(i/b.trail.length),0,Math.PI*2);ctx.fill();});ctx.shadowColor=b.color;ctx.shadowBlur=10;ctx.fillStyle=b.color;ctx.beginPath();ctx.arc(b.x,b.y,b.radius,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;});
    if(players[0]&&players[0].alive&&!isMobile){ctx.strokeStyle='#ffffff55';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(mouseX-12,mouseY);ctx.lineTo(mouseX-4,mouseY);ctx.moveTo(mouseX+4,mouseY);ctx.lineTo(mouseX+12,mouseY);ctx.stroke();ctx.beginPath();ctx.moveTo(mouseX,mouseY-12);ctx.lineTo(mouseX,mouseY-4);ctx.moveTo(mouseX,mouseY+4);ctx.lineTo(mouseX,mouseY+12);ctx.stroke();ctx.fillStyle='#ffffff77';ctx.beginPath();ctx.arc(mouseX,mouseY,2,0,Math.PI*2);ctx.fill();}
    lootPopups.forEach(p=>{ctx.globalAlpha=p.alpha;ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=8;ctx.font='bold 12px Courier New';ctx.textAlign='center';ctx.fillText(p.label,p.x,p.y);ctx.shadowBlur=0;ctx.globalAlpha=1;});
    if(waveState.bannerTimer>0){const alpha=Math.min(1,waveState.bannerTimer/60);ctx.globalAlpha=alpha;ctx.fillStyle=waveState.isBossWave?'#ff2200':'#00ff88';ctx.font='bold 34px Courier New';ctx.textAlign='center';ctx.shadowColor=waveState.isBossWave?'#ff2200':'#00ff88';ctx.shadowBlur=20;ctx.fillText(waveState.isBossWave?`⚠ BOSS WAVE ${waveState.current}!`:`WAVE ${waveState.current} CLEARED!`,canvas.width/2,canvas.height/2-40);ctx.shadowBlur=0;ctx.globalAlpha=1;}
    ctx.restore();
    drawHUD();
    drawSpecialHUD();
    if(gameState==='choice')drawChoiceScreen();
    if(gameState==='shop')  drawShopScreen();
    if(gameState==="dead")  drawGameOver();
  }

  function gameLoop(){update();draw();requestAnimationFrame(gameLoop);}
  gameLoop();
</script>
</body>
</html>
